name = "imagebed"
compatibility_date = "2025-01-01"
pages_build_output_dir = "public"

# R2 bucket for storing images. Create with:
#   npx wrangler r2 bucket create imagebed
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "imagebed"

# Workers AI binding — used by /api/generate for the AI image models.
[ai]
binding = "AI"

# ---- Login password ----
# The admin password is stored in R2 at the path below, as a salted SHA-256
# hash. Pick a hard-to-guess path (this value is embedded in the deploy
# metadata and never exposed to the client), and change it if you ever suspect
# the value has leaked. `/file/*` and `/api/list` refuse to serve this path,
# but "unguessable" is still your first line of defense.
#
# If the file does not exist yet, the default password is `123456` — visit
# /settings.html and change it immediately after the first deploy. Rotating
# the password via /settings.html creates or overwrites this file.
[vars]
PASSWORD_PATH = "admin/pass-oiuvyuoawue543262U"
